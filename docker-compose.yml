name: hpc-slurm-lab

x-slurm-image: &slurm-image
  image: ${IMAGE_TAG:-hpc-slurm-lab:latest}
  build:
    context: ./images/slurm
    args:
      SLURM_VERSION: ${SLURM_VERSION:-25.05.3}
      BASE_IMAGE: ${BASE_IMAGE:-rockylinux:9}

x-slurm-volumes: &slurm-volumes
  - munge:/etc/munge
  - ./software:/software
  - jobs:/data
  - home:/home/admin

services:
  mysql:
    image: mariadb:11
    container_name: hpc-mysql
    hostname: mysql
    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: slurm_acct_db
      MARIADB_USER: slurm
      MARIADB_PASSWORD: slurm
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [hpc]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  slurmdbd:
    <<: *slurm-image
    container_name: hpc-slurmdbd
    hostname: slurmdbd
    command: ["slurmdbd"]
    volumes: *slurm-volumes
    networks: [hpc]
    depends_on:
      mysql:
        condition: service_healthy

  slurmctld:
    <<: *slurm-image
    container_name: hpc-slurmctld
    hostname: slurmctld
    command: ["slurmctld"]
    volumes: *slurm-volumes
    networks: [hpc]
    ports:
      - "6817:6817"
    depends_on:
      - slurmdbd

  c1:
    <<: *slurm-image
    container_name: hpc-c1
    hostname: c1
    command: ["slurmd"]
    privileged: true
    cgroup: host
    volumes: *slurm-volumes
    networks: [hpc]
    depends_on:
      - slurmctld

  c2:
    <<: *slurm-image
    container_name: hpc-c2
    hostname: c2
    command: ["slurmd"]
    privileged: true
    cgroup: host
    volumes: *slurm-volumes
    networks: [hpc]
    depends_on:
      - slurmctld

  g1:
    <<: *slurm-image
    profiles: ["gpu"]
    container_name: hpc-g1
    hostname: g1
    command: ["slurmd"]
    privileged: true
    cgroup: host
    environment:
      NODE_FEATURES: ${GPU_FEATURES:-gpu}
      NODE_GRES: ${GPU_GRES:-gpu:rtx:1}
    volumes: *slurm-volumes
    networks: [hpc]
    depends_on:
      - slurmctld
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  munge:
  jobs:
  home:
  mysql_data:

networks:
  hpc:
    driver: bridge
